name: Build and release APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Java
        uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Locate APK
        id: apk
        run: |
          apk_path="$(find app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)"

          if [ -z "${apk_path}" ]; then
            echo "No APK was produced." >&2
            exit 1
          fi

          echo "path=${apk_path}" >> "${GITHUB_OUTPUT}"
          echo "name=$(basename "${apk_path}")" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: BatteryMax-release-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Set release metadata
        id: release
        run: |
          echo "tag=master-build-${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"
          echo "name=BatteryMax master build ${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"

      - name: Publish release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}
